<div class="list">
  <h1>Registered users</h1>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (loading()) {
    <p>Loading...</p>
  } @else {
    <div class="rows">
      <div class="row header">
        <span>Avatar</span>
        <span>Name</span>
        <span>CPF</span>
        <span>Actions</span>
      </div>
      @for (user of users(); track user.id) {
        <div class="row">
          <div class="avatar">{{ initialsOf(user.name) }}</div>
          <span class="name">{{ user.name }}</span>
          <span class="cpf">{{ user.cpf }}</span>
          <span class="actions">
            <button type="button" class="action-button" (click)="onEdit(user)">Edit</button>
            <button type="button" class="action-button delete" (click)="onDelete(user)">
              Delete
            </button>
          </span>
        </div>
      }
    </div>
  }
</div>
