<div class="details">
  <h1>User details</h1>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (loading()) {
    <p>Loading...</p>
  } @else if (user(); as user) {
    <div class="card">
      @if (pictureBroken()) {
        <div class="avatar">{{ initialsOf(user.name) }}</div>
      } @else {
        <img
          class="avatar-picture"
          [src]="pictureUrl(user)"
          [alt]="user.name"
          (error)="onPictureError()"
        />
      }
      <div class="info">
        <span class="name">{{ user.name }}</span>
        <span class="cpf">{{ formatCpf(user.cpf) }}</span>
      </div>
      <div class="actions">
        <button type="button" class="action-button" (click)="onEdit()">Edit</button>
        <button type="button" class="action-button delete" (click)="onDelete()">Delete</button>
      </div>
    </div>
  }

  @if (editing()) {
    @if (user(); as editUser) {
      <app-edit-user-modal [user]="editUser" (saved)="onEditSaved()" (cancelled)="onEditCancelled()" />
    }
  }
</div>
