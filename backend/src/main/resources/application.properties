spring.application.name=facialreconbackend
spring.datasource.url=jdbc:postgresql://localhost:5432/facial_recon
spring.datasource.username=${FR_USER}
spring.datasource.password=${FR_PW}

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=80MB

app.storage.pictures-dir=storage/pictures

app.face.match-threshold=0.60