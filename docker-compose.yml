services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${FR_USER}
      POSTGRES_PASSWORD: ${FR_PW}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FR_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      FR_USER: ${FR_USER}
      FR_PW: ${FR_PW}
    volumes:
      - backend-pictures:/home/appuser/storage/pictures
      - backend-model-cache:/home/appuser/.djl.ai
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-pictures:
  backend-model-cache:
